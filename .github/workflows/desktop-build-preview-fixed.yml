name: Desktop Preview Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "desktop-preview-*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            target: vscode-darwin-arm64-min
          - os: windows-latest  
            target: vscode-win32-x64-min
          - os: ubuntu-latest
            target: vscode-linux-x64-min

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version-file: "apps/desktop/core/.nvmrc"
          cache: "npm"
          cache-dependency-path: "apps/desktop/core/package-lock.json"

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential g++ \
            libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev \
            python-is-python3

          echo "Build outputs:"
          find . -maxdepth 4 -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \) -print || true

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-${{ matrix.target }}
          path: |
            VSCode*/**/*.zip
            VSCode*/**/*.tar.gz
            VSCode*/**/*.dmg
            VSCode*/**/*.exe
            VSCode*/**/*.AppImage
            .logs/**
          if-no-files-found: error
