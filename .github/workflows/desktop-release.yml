name: Desktop Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Hygiene (prevent .env leak)
        run: |
          find . -name ".env" -delete
          find . -name ".env.local" -delete

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev python3-pip

      - name: Install dependencies (Code-OSS)
        working-directory: apps/desktop/core
        run: npm install

      - name: Build Code-OSS
        working-directory: apps/desktop/core
        run: npm run compile-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Desktop App
        working-directory: apps/desktop/core
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npm run gulp vscode-darwin-arm64-min
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run gulp vscode-win32-x64-min
          else
            npm run gulp vscode-linux-x64-min
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            apps/desktop/core/out-vscode-macos-arm64/*.zip
            apps/desktop/core/out-vscode-win32-x64/*.zip
            apps/desktop/core/out-vscode-linux-x64/VSCode-linux-x64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
